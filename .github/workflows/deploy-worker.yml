name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: CHITTYOS/chittyops/.github/workflows/reusable-worker-deploy.yml@main
    with:
      service_name: chittycommand
